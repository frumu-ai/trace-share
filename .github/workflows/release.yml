name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `trace-share ${tag}`,
              draft: true,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: trace-share-linux-x64.tar.gz
            npm_asset: trace-share-linux-x64
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: trace-share-linux-arm64.tar.gz
            npm_asset: trace-share-linux-arm64
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: trace-share-darwin-x64.zip
            npm_asset: trace-share-darwin-x64
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: trace-share-darwin-arm64.zip
            npm_asset: trace-share-darwin-arm64
            archive: zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: trace-share-windows-x64.zip
            npm_asset: trace-share-windows-x64.exe
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p trace-share-cli --target ${{ matrix.target }}
      - name: Package unix
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/trace-share dist/trace-share
          chmod +x dist/trace-share
          cp dist/trace-share dist/${{ matrix.npm_asset }}
          chmod +x dist/${{ matrix.npm_asset }}
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -j dist/${{ matrix.asset }} dist/trace-share
          else
            tar -czf dist/${{ matrix.asset }} -C dist trace-share
          fi
          sha256sum dist/${{ matrix.npm_asset }} > dist/${{ matrix.npm_asset }}.sha256
      - name: Package windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/trace-share.exe" "dist/trace-share.exe" -Force
          Copy-Item "dist/trace-share.exe" "dist/${{ matrix.npm_asset }}" -Force
          Compress-Archive -Path "dist/trace-share.exe" -DestinationPath "dist/${{ matrix.asset }}" -Force
          $hash = (Get-FileHash -Algorithm SHA256 "dist/${{ matrix.npm_asset }}").Hash.ToLower()
          "$hash  ${{ matrix.npm_asset }}" | Out-File -FilePath "dist/${{ matrix.npm_asset }}.sha256" -Encoding ascii
      - name: Upload asset
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          ASSET: ${{ matrix.asset }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = Number(process.env.RELEASE_ID);
            const name = process.env.ASSET;
            const fullPath = path.join(process.cwd(), 'dist', name);
            const data = fs.readFileSync(fullPath);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name,
              data,
              headers: {
                'content-type': name.endsWith('.zip') ? 'application/zip' : 'application/gzip',
                'content-length': data.length,
              },
            });
      - name: Upload npm binary asset
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          ASSET: ${{ matrix.npm_asset }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = Number(process.env.RELEASE_ID);
            const name = process.env.ASSET;
            const fullPath = path.join(process.cwd(), 'dist', name);
            const data = fs.readFileSync(fullPath);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name,
              data,
              headers: {
                'content-type': 'application/octet-stream',
                'content-length': data.length,
              },
            });
      - name: Upload npm checksum asset
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          ASSET: ${{ matrix.npm_asset }}.sha256
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const releaseId = Number(process.env.RELEASE_ID);
            const name = process.env.ASSET;
            const fullPath = path.join(process.cwd(), 'dist', name);
            const data = fs.readFileSync(fullPath);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name,
              data,
              headers: {
                'content-type': 'text/plain',
                'content-length': data.length,
              },
            });

  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
            });
