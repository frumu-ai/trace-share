name: registry-schema

on:
  pull_request:
    paths:
      - "registry/**"
      - "crates/trace-share-core/src/sources.rs"
      - "crates/trace-share-core/tests/registry_manifest.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/registry-schema.yml"
  push:
    branches: ["main"]
    paths:
      - "registry/**"
      - "crates/trace-share-core/src/sources.rs"
      - "crates/trace-share-core/tests/registry_manifest.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/registry-schema.yml"

jobs:
  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate registry schema
        run: cargo test -p trace-share-core registry_manifest -- --nocapture
